_base_: ../default.yaml

project:
  name: horsejump-high
  input_images: demo/horsejump-high/images
  input_masks: demo/horsejump-high/masks
  output_multiview: outputs/multiview/horsejump-high
  output_prepared: outputs/prepared/horsejump-high
  output_rendering_base: outputs/rendering/horsejump-high

common:
  seed: 23

stage_1:
  background:
    confidence_threshold: 50.0
    outlier_nb_neighbors: 1000
    outlier_std_ratio: 1.0

  rendering:
    arc_type: yaw
    arc_angle: -120
    arc_radius_scale: 1.0
